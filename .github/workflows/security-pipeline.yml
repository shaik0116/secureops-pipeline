name: SecureOps Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: secureops-api
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v

  sast:
    name: SAST - Bandit Code Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST scan
        run: bandit -r app/ -f json -o bandit-results.json || true

      - name: Print Bandit findings summary
        run: |
          echo "=========================================="
          echo "        SAST SCAN RESULTS (Bandit)"
          echo "=========================================="
          bandit -r app/ -f text || true
          echo "=========================================="

      - name: Upload SAST results
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-results
          path: bandit-results.json
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run secrets scan
        run: detect-secrets scan --all-files > secrets-results.json || true

      - name: Print secrets summary
        run: |
          echo "=========================================="
          echo "        SECRETS SCAN RESULTS"
          echo "=========================================="
          python3 -c "
          import json
          with open('secrets-results.json') as f:
              data = json.load(f)
          results = data.get('results', {})
          total = sum(len(v) for v in results.values())
          print(f'Total potential secrets found: {total}')
          for filename, secrets in results.items():
              for s in secrets:
                  print(f'  [{s[\"type\"]}] in {filename} line {s[\"line_number\"]}')
          " || true
          echo "=========================================="

      - uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-results
          path: secrets-results.json

  iac-scan:
    name: IaC Scan - Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov IaC scan
        run: checkov -d terraform/ --output json --output-file-path . || true

      - uses: actions/upload-artifact@v4
        with:
          name: checkov-iac-results
          path: results_json.json

  container-scan:
    name: Container Scan - Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t secureops-api:test .

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secureops-api:test
          format: json
          output: trivy-results.json
          exit-code: "0"

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-container-results
          path: trivy-results.json
  ai-summary:
    name: AI Risk Summary
    runs-on: ubuntu-latest
    needs: [sast, secrets-scan, iac-scan, container-scan]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install google-genai

      - name: Download all scan artifacts
        uses: actions/download-artifact@v4

      - name: Move scan files to working directory
        run: |
          find . -name "bandit-results.json" -exec cp {} . \;
          find . -name "secrets-results.json" -exec cp {} . \;
          find . -name "results_json.json" -exec cp {} . \;
          find . -name "trivy-results.json" -exec cp {} . \;

      - name: Run AI summariser
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/ai_summariser.py

      - name: Print AI summary to log
        run: |
          echo "=========================================="
          echo "       AI SECURITY RISK SUMMARY"
          echo "=========================================="
          cat ai-risk-summary.txt
          echo "=========================================="

      - name: Upload AI summary
        uses: actions/upload-artifact@v4
        with:
          name: ai-risk-summary
          path: ai-risk-summary.txt

